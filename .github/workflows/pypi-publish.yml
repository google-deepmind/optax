name: pypi

on:
  release:
    types: [created]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
    - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
    - name: Set up Python
      uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548 # v6
      with:
        python-version: '3.x'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install setuptools wheel twine build
    - name: Check consistency between the package version and release tag
      run: |
        pip install .
        RELEASE_VER=${GITHUB_REF#refs/*/}
        PACKAGE_VER="v`python -c 'import optax; print(optax.__version__)'`"
        if [ $RELEASE_VER != $PACKAGE_VER ]
        then
          echo "package ver. ($PACKAGE_VER) != release ver. ($RELEASE_VER)"; exit 1
        fi
    - name: Check conda-forge dependency sync
      run: |
        python3 <<'PYEOF'
import re, urllib.request, sys
try:
    import tomllib  # Python 3.11+
except ImportError:
    import tomli as tomllib  # Python <3.11

from packaging.version import Version

WARN = lambda msg: print(f"::warning ::{msg}")

# 1. Parse pyproject.toml
with open("pyproject.toml", "rb") as f:
    pyproject = tomllib.load(f)

jax_pin = None
for dep in pyproject.get("project", {}).get("dependencies", []):
    m = re.match(r"jax\s*(>=|==|)\s*([\w.]+)", dep)
    if m:
        jax_pin = m.group(2)
        break

if jax_pin is None:
    WARN("could not find jax dependency in pyproject.toml")
    sys.exit(0)

# 2. Fetch conda-forge recipe
try:
    req = urllib.request.urlopen(
        "https://raw.githubusercontent.com/conda-forge/optax-feedstock/main/recipe/meta.yaml",
        timeout=10,
    )
    conda_meta = req.read().decode()
except Exception as e:
    WARN(f"unable to fetch conda-forge recipe ({e}); skipping sync check")
    sys.exit(0)

m = re.search(r"^\s*-\s+jax\s*>=\s*([\w.]+)", conda_meta, re.MULTILINE)
if not m:
    WARN("could not find jax pin in conda-forge recipe")
    sys.exit(0)
conda_jax = m.group(1)

# 3. Compare
if Version(jax_pin) != Version(conda_jax):
    WARN(f"jax pin mismatch - PyPI: jax>={jax_pin}, conda: jax>={conda_jax}")
    print(f"Please open a PR at "
          f"https://github.com/conda-forge/optax-feedstock "
          f"to update recipe/meta.yaml: jax >={jax_pin}, jaxlib >={jax_pin}")
else:
    print(f"conda-forge jax pin matches PyPI ({jax_pin}).")
PYEOF
    - name: Build
      run: |
        python -m build
    - name: Publish package distributions to PyPI
      uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e  # release/v1.13
