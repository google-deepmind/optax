name: pypi

on:
  release:
    types: [created]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
    - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
    - name: Set up Python
      uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548 # v6
      with:
        python-version: '3.x'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install setuptools wheel twine build
    - name: Check consistency between the package version and release tag
      run: |
        pip install .
        RELEASE_VER=${GITHUB_REF#refs/*/}
        PACKAGE_VER="v`python -c 'import optax; print(optax.__version__)'`"
        if [ $RELEASE_VER != $PACKAGE_VER ]
        then
          echo "package ver. ($PACKAGE_VER) != release ver. ($RELEASE_VER)"; exit 1
        fi
    - name: Check conda-forge dependency sync
      run: |
        echo "Checking conda-forge feedstock dependency bounds..."
        CONDA_META=$(curl -s https://raw.githubusercontent.com/conda-forge/optax-feedstock/main/recipe/meta.yaml 2>/dev/null) || {
          echo "warning: unable to fetch conda-forge recipe; skipping sync check"
          exit 0
        }
        PYPI_JAX=$(grep -E '^\s+"jax'>=' pyproject.toml | sed 's/.*"jax>=\([^"]*\)".*//')
        CONDA_JAX=$(echo "$CONDA_META" | grep -E '^\s+\- jax >=' | sed 's/.*jax >=\([^"]*\)//')
        if [ -n "$PYPI_JAX" ] && [ -n "$CONDA_JAX" ] && [ "$PYPI_JAX" != "$CONDA_JAX" ]; then
          echo "warning: jax pin mismatch — PyPI: jax>=$PYPI_JAX, conda: jax>=$CONDA_JAX"
          echo "Please open a PR at https://github.com/conda-forge/optax-feedstock"
          echo "to update recipe/meta.yaml: jax >=$PYPI_JAX, jaxlib >=$PYPI_JAX"
        else
          echo "conda-forge jax pin matches PyPI ($PYPI_JAX)."
        fi
    - name: Build
      run: |
        python -m build
    - name: Publish package distributions to PyPI
      uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e  # release/v1.13
